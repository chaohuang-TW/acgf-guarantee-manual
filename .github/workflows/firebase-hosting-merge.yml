# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  checks: write
  contents: read
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build and Validate Site
        run: |
          python scripts/build_site.py
          python scripts/validate_site.py
          python scripts/validate_page_rendering.py
          python scripts/audit_content.py
          python scripts/audit_search_quality.py
          python scripts/audit_search_context.py
        env:
          SITE_ORIGIN: https://acgf-guarantee-manual-tw.web.app
          SITE_BASE_PATH: /
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ACGF_GUARANTEE_MANUAL_TW }}
          channelId: live
          projectId: acgf-guarantee-manual-tw
